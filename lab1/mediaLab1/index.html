<!DOCTYPE html>
<html>
<head>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
</head>
<body>
    <video id="my-video" class="video-js" controls width="600">
        <source src="https://d2zihajmogu5jn.cloudfront.net/bipbop-advanced/bipbop_16x9_variant.m3u8" type="application/x-mpegURL">
    </video>
    <br>
    <button onclick="playVideo()">Play</button>
    <button onclick="pauseVideo()">Pause</button>
    <button onclick="stopVideo()">Stop</button>
    <button onclick="jumpForward()">Jump to 5 sec forward</button>
    <button onclick="jumpBackward()">Jump to 5 sec backward</button>

    <br><br>
    <b>Playlist</b><br>
    <div id="playlist">
        <div>
            <input type="text" id="url1" value="https://d2zihajmogu5jn.cloudfront.net/bipbop-advanced/bipbop_16x9_variant.m3u8" size="60">
            <button onclick="loadUrl('url1')">Load</button>
        </div>
        <div>
            <input type="text" id="url2" value="https://d2zihajmogu5jn.cloudfront.net/bipbop-advanced/bipbop_16x9_variant.m3u8" size="60">
            <button onclick="loadUrl('url2')">Load</button>
        </div>
    </div>
    <button onclick="shuffle()">Shuffle</button>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script>
        var player = videojs('my-video');

        function playVideo() { player.play(); }
        function pauseVideo() { player.pause(); }
        function stopVideo() { player.pause(); player.currentTime(0); }
        function jumpForward() { player.currentTime(player.currentTime() + 5); }
        function jumpBackward() { player.currentTime(player.currentTime() - 5); }

        function loadUrl(id) {
            var url = document.getElementById(id).value;
            player.src({ src: url, type: 'application/x-mpegURL' });
            player.play();
        }

        function shuffle() {
            var inputs = document.querySelectorAll('#playlist input');
            var urls = Array.from(inputs).map(i => i.value);
            urls.sort(() => Math.random() - 0.5);
            inputs.forEach((input, i) => input.value = urls[i]);
            loadUrl(inputs[0].id);
        }
    </script>
</body>
</html>
