<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Lab5 - WebRTC Video Streaming</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: #2c3e50;
            color: white;
        }
        .header {
            background: #34495e;
            padding: 15px;
            text-align: center;
            border-bottom: 3px solid #3498db;
        }
        .container {
            display: flex;
            height: calc(100vh - 60px);
        }
        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 2px solid #34495e;
        }
        .panel:last-child {
            border-right: none;
        }
        .panel-header {
            background: #34495e;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 18px;
        }
        .panel-header.server {
            background: #27ae60;
        }
        .panel-header.client {
            background: #3498db;
        }
        iframe {
            flex: 1;
            border: none;
            background: white;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Lab5 - WebRTC Video Streaming Demo</h1>
        <p style="margin-top:5px; font-size:14px;">Server captures video, Client receives and displays it</p>
    </div>
    <div class="container">
        <div class="panel">
            <div class="panel-header server">SERVER (Video Sender)</div>
            <iframe src="server.html"></iframe>
        </div>
        <div class="panel">
            <div class="panel-header client">CLIENT (Video Receiver)</div>
            <iframe src="client.html"></iframe>
        </div>
    </div>
</body>
</html>
