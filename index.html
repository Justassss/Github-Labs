<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multimedijos laboratoriniai darbai</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            max-width: 1000px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 40px;
            font-size: 2.5em;
        }
        
        .labs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
        }
        
        .lab-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: white;
        }
        
        .lab-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }
        
        .lab-number {
            font-size: 3em;
            font-weight: bold;
            margin-bottom: 10px;
            opacity: 0.9;
        }
        
        .lab-title {
            font-size: 1.2em;
            font-weight: 600;
        }
        
        @media (max-width: 768px) {
            h1 {
                font-size: 2em;
            }
            
            .labs-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Multimedijos laboratoriniai darbai</h1>
        
        <div class="labs-grid">
            <a href="lab1/mediaLab1/index.html" class="lab-card">
                <div class="lab-number">1</div>
                <div class="lab-title">mediaLab1</div>
            </a>
            
            <a href="lab2/mediaLab2-master/mediaLab2-master/aframe/index.html" class="lab-card">
                <div class="lab-number">2</div>
                <div class="lab-title">mediaLab2</div>
            </a>
            
            <a href="lab3/mediaLab3-master/mediaLab3-master/src/index.html" class="lab-card">
                <div class="lab-number">3</div>
                <div class="lab-title">mediaLab3</div>
            </a>
            
            <a href="lab4/mediaLab4-master/mediaLab4-master/src/index.html" class="lab-card">
                <div class="lab-number">4</div>
                <div class="lab-title">mediaLab4</div>
            </a>
            
            <a href="lab5/server.html" class="lab-card">
                <div class="lab-number">5</div>
                <div class="lab-title">mediaLab5</div>
            </a>
        </div>
    </div>
</body>
</html>
